<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>একটি বিশেষ আমন্ত্রণ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            position: relative;
            background: #1a0010;
        }
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(6px);
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(200,0,80,0.25);
            max-width: 420px;
            width: 92%;
        }
        h1 { color: #e0185a; font-size: 23px; margin-bottom: 20px; line-height: 1.4; }
        p  { color: #444; font-size: 17px; line-height: 1.6; }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 22px;
            position: relative;
            height: 52px;
        }
        button {
            padding: 12px 26px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Hind Siliguri', sans-serif;
            transition: transform 0.15s;
        }
        button:active { transform: scale(0.96); }
        #yesBtn { background: linear-gradient(135deg,#ff4d6d,#ff85a1); color: white; box-shadow: 0 4px 14px rgba(255,77,109,0.4); }
        #noBtn  { background-color: #aaa; color: white; position: absolute; left: 55%; }
        select, input[type="date"] {
            width: 85%;
            padding: 11px 14px;
            margin-top: 15px;
            border: 2px solid #ff4d6d;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Hind Siliguri', sans-serif;
            background: white;
            color: #333;
        }
        .next-btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg,#ff4d6d,#ff85a1);
            color: white;
            box-shadow: 0 4px 14px rgba(255,77,109,0.35);
        }
        .hidden { display: none; }
        .heart-anim { font-size: 52px; animation: beat 0.65s infinite alternate; display: block; margin-bottom: 10px; }
        @keyframes beat { to { transform: scale(1.18); } }
        .petal {
            position: fixed;
            top: -40px;
            font-size: 22px;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 0;
            opacity: 0.85;
        }
        @keyframes fall {
            0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container" id="box">
    <span class="heart-anim">❤️</span>

    <!-- Screen 1 -->
    <div id="screen1">
        <h1>তুমি কি আমার সাথে ডেটে যেতে চাও?</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="nextScreen(2)">হ্যাঁ 💕</button>
            <button id="noBtn" onmouseover="moveNoButton()">না</button>
        </div>
    </div>

    <!-- Screen 2 -->
    <div id="screen2" class="hidden">
        <h1>দারুণ! 😍 কোথায় যেতে চাও?</h1>
        <select id="place">
            <option value="ক্যাফে">☕ সুন্দর কোনো ক্যাফে</option>
            <option value="রেস্টুরেন্ট">🍽️ রোমান্টিক ডিনার</option>
            <option value="আইসক্রিম খেতে খেতে হাঁটতে">🍦 আইসক্রিম খেতে খেতে হাঁটতে</option>
            <option value="সিনেমা">🍿 মুভি ডেট</option>
        </select>
        <br>
        <button class="next-btn" onclick="nextScreen(3)">পরবর্তী →</button>
    </div>

    <!-- Screen 3 -->
    <div id="screen3" class="hidden">
        <h1>কোন দিন ফ্রি আছো? 🗓️</h1>
        <input type="date" id="dateInput">
        <br>
        <button class="next-btn" onclick="finalSubmit()">হয়ে গেছে! 🎉</button>
    </div>

    <!-- Screen 4 -->
    <div id="screen4" class="hidden">
        <h1>একদম ঠিক! 🎉</h1>
        <p id="finalMessage"></p>
        <span class="heart-anim">🥰</span>
    </div>
</div>

<script>
    emailjs.init('TAGXfhZ6xKY_tsRaJ0v4-');

    const petals = ['🌸','🌺','🌹','🌷','💐','🌼'];
    for(let i = 0; i < 18; i++){
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = petals[Math.floor(Math.random()*petals.length)];
        p.style.left = Math.random()*100 + 'vw';
        p.style.fontSize = (16 + Math.random()*18) + 'px';
        const dur = 6 + Math.random()*8;
        p.style.animationDuration = dur + 's';
        p.style.animationDelay = (-Math.random()*dur) + 's';
        document.body.appendChild(p);
    }

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, flowers = [];

    function resize(){
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randFlower(){
        return {
            x: Math.random()*W,
            y: Math.random()*H,
            r: 18 + Math.random()*28,
            petals: 5 + Math.floor(Math.random()*3),
            hue: Math.random()<0.5 ? (330+Math.random()*30) : (280+Math.random()*40),
            alpha: 0.12 + Math.random()*0.18,
            speed: 0.0003 + Math.random()*0.0004,
            phase: Math.random()*Math.PI*2
        };
    }

    for(let i=0;i<28;i++) flowers.push(randFlower());

    function drawFlower(f, t){
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.phase + t*f.speed);
        const n = f.petals;
        ctx.globalAlpha = f.alpha;
        for(let i=0;i<n;i++){
            ctx.save();
            ctx.rotate((Math.PI*2/n)*i);
            ctx.beginPath();
            ctx.ellipse(0, -f.r*0.6, f.r*0.28, f.r*0.6, 0, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${f.hue},80%,72%)`;
            ctx.fill();
            ctx.restore();
        }
        ctx.beginPath();
        ctx.arc(0,0,f.r*0.22,0,Math.PI*2);
        ctx.fillStyle = `hsl(${f.hue+20},90%,88%)`;
        ctx.fill();
        ctx.restore();
    }

    function loop(t){
        ctx.clearRect(0,0,W,H);
        flowers.forEach(f => drawFlower(f,t));
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    function moveNoButton(){
        const noBtn = document.getElementById('noBtn');
        const x = Math.random()*(window.innerWidth-150)-(window.innerWidth/2)+75;
        const y = Math.random()*(window.innerHeight-100)-(window.innerHeight/2)+50;
        noBtn.style.transform = `translate(${x}px,${y}px)`;
    }

    function nextScreen(num){
        ['screen1','screen2','screen3','screen4'].forEach(id=>
            document.getElementById(id).classList.add('hidden'));
        document.getElementById('screen'+num).classList.remove('hidden');
    }

    function finalSubmit(){
        const place = document.getElementById('place').value;
        const date  = document.getElementById('dateInput').value;
        if(!date){ alert("দয়া করে একটি তারিখ সিলেক্ট করো!"); return; }

        emailjs.send('service_49e6i12', 'template_xw8m0x4', {
            place: place,
            date: date,
            name: 'Date Invite',
            email: 'cine45ma@gmail.com'
        }).then(function(){
            console.log('Email sent!');
        }, function(error){
            console.log('Email error:', JSON.stringify(error));
            alert('Email error: ' + JSON.stringify(error));
        });

        nextScreen(4);
        document.getElementById('finalMessage').innerHTML =
            `আমরা <b>${date}</b> তারিখে <b>${place}</b>-এ যাচ্ছি!<br>আমি অপেক্ষা করবো। ❤️`;
    }
</script>
</body>
</html>
